inherit_from: ./finetune_lvr05_high_rfca_ssl_i0001_mtae.yaml

experiment_name: af_ablation_202602_hparam_search_lvr05_high_rfca_ssl_i0001_mtae_th5

data:
  manifest_path: /data/projects/study-af-ablation/manifests/finetune_lvr05_high_rfca_th5.parquet

hparam_search:
  framework: grid
  trial_limit: 25
  n_sample_sets: 10
  objective_metric: test_macro_auroc
  maximize: true
  grid_shuffle: true
  sample:
    seed: 42
    group_column: pid
    replacement: false
    train_frac: 1.0
    valid_frac: 1.0
    test_frac: 1.0
  search_space:
    finetune.lr: [3.0e-2, 1.0e-2, 1.0e-3, 3.0e-4, 1.0e-4]
    finetune.weight_decay: [1.0e-2, 5.0e-2]
    finetune.layer_decay: [0.5, 0.8, 0.9, 1.0]
    data.batch_size: [16, 32, 64, 128]
#    finetune.freeze_encoder: [true]
    finetune.num_freeze_layers: [0, 6, 9]
