inherit_from: /data/projects/ai-ecg/configs/base.yaml

experiment_name: af_ablation_202602_finetune_lvr05_high_rfca
output_dir: /data/projects/ai-ecg/outputs/af_ablation_202602

runtime:
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: 32
  log_every_n_steps: 20
  num_sanity_val_steps: 0

data:
  source: zarr
  manifest_path: /data/projects/study-af-ablation/manifests/finetune_lvr05_high_rfca.parquet
  split_column: split
  split_values:
    train: train
    valid: valid
    test: test
  label_columns: [LVR05_high]
  sample_rate_column: sample_rate
  signal_length: 2250
  downsample_to_signal_length: true
  batch_size: 16
  num_workers: 8
  read_error_policy: skip_retry
  read_error_max_retries: 16
  read_error_log_limit: 50
  read_error_log_every: 500
  preprocessing:
    enabled: true
    target_sample_rate: 250
    crop_seconds: 9.0
    train_crop_mode: random
    eval_crop_mode: fixed
    fixed_crop_position: start
    fixed_start_sec: 0.0
    eval_fixed_start_secs: [0.0, 0.5, 1.0]
    standardize: true
    augmentation:
      enabled: true
      op_names: [shift, cutout, drop, flip, erase, sine, partial_sine, partial_white_noise]
      level: 10
      num_layers: 2
      prob: 0.5
      max_proportion_const: 0.3
      wave_amplitude_const: 0.3
      wave_frequency_const: 0.5
      white_noise_scale_const: 0.3
  zarr:
    store_column: zarr_store
    group_column: zarr_group
    ds_idx_column: ds_idx
    ds_row_idx_column: ds_row_idx
    dataset_names: [fs500, fs250]
    value_scale: 4.0

model:
  vit:
    in_channels: 12
    seq_len: 2250
    patch_size: 25
    embed_dim: 768
    depth: 12
    mlp_dim: 3072
    heads: 12
    dim_head: 64
    dropout: 0.0
    attn_dropout: 0.0
    use_cls_token: true
    sinusoid_pos_embed: true
    pooling: cls_or_mean
    num_classes: 1

finetune:
  lr: 1.0e-3
  weight_decay: 0.01
  freeze_encoder: false
  pretrained_checkpoint: /data/projects/ai-ecg/outputs/af_ablation_202602/af_ablation_202602_pretrain_emory_i0006_partial_signal_pretrain_20260302_220848/checkpoints/last.ckpt
  run_test_after_fit: true
  scheduler:
    name: linear_warmup_cosine
    interval: epoch
    warmup_epochs: 5
    warmup_start_factor: 0.1
    min_lr: 1.0e-4
    cosine_t_max: 18

finetune_cmd:
  trainer:
    max_epochs: 20
    accumulate_grad_batches: 1
